<!DOCTYPE html>
<html>
<head>
    <title>QUARTEL - Avaliador</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #eef3f8;
            margin: 0;
        }

        /* HEADER */
        .header {
            background: linear-gradient(90deg, #0a3d62, #1e6fa3);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header img {
            height: 70px;
        }

        .header-text h1 {
            margin: 0;
            font-size: 22px;
        }

        .header-text div {
            font-size: 14px;
        }

        /* MENU */
        .menu {
            background-color: #145a86;
            padding: 12px;
            text-align: center;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            margin: 0 15px; /* Espaçamento entre os botões do menu */
        }

        .menu a:hover {
            text-decoration: underline;
        }

        /* CONTAINER */
        .container {
            padding: 40px;
            max-width: 700px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #0a3d62;
        }

        /* SELECT */
        .select-militar {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #f8fbff;
        }

        .select-militar:focus {
            outline: none;
            border-color: #1e6fa3;
            box-shadow: 0 0 5px rgba(30,111,163,0.4);
        }

        /* BOTÃO */
        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #0a3d62;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #1e6fa3;
        }

        /* RODAPÉ */
        .rodape {
            text-align: center;
            margin-top: 40px;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="header">
    <img src="{{ url_for('static', filename='imagens/logo.png') }}">

    <div class="header-text">
        <h1>QUARTEL</h1>
        <div>Painel do Avaliador</div>
    </div>
</div>

<div class="menu">
    <!-- botão para alterar senha -->
    <a href="/alterar_senha">Alterar Senha</a>
    <a href="/logout">Sair</a>
</div>

<div class="container">

    <h2>Selecionar Militar</h2>

    <select class="select-militar" id="militarSelect">
        <option value="">-- Selecione o Militar --</option>

        {# Definimos a ordem: Cb=1, Sd EP=2, Sd EV=3 e ordenamos primeiro pelo peso, depois pelo nome #}
        {% set peso_posto = {'Cb': 1, 'Cabo': 1, 'Sd EP': 2, 'Sd EV': 3} %}
        
        {% for m in militares | sort(attribute='nome') | sort(attribute='posto') %}
            <option value="{{ m.id }}">
                {{ m.posto }} - {{ m.nome }} - {{ m.pelotao }}
            </option>
        {% endfor %}

    </select>

    <button onclick="avaliar()">Avaliar Militar</button>

</div>

<div class="rodape">
    QUARTEL - Sistema FO Digital
</div>

<script>
function avaliar(){
    var id = document.getElementById("militarSelect").value;
    if(id){
        window.location = "/avaliar/" + id;
    } else {
        alert("Selecione um militar");
    }
}
</script>

</body>
</html>
