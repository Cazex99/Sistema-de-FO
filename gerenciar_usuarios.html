<!DOCTYPE html>
<html>
<head>
    <title>Gerenciar Usuários - QUARTEL</title>

<style>

body{
    font-family:'Segoe UI', Tahoma, sans-serif;
    background:#eef3f8;
    margin:0;
}

/* HEADER */
.header{
    background: linear-gradient(90deg, #0a3d62, #1e6fa3);
    color:white;
    padding:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
}

.header img{
    height:70px;
}

.header-text h1{
    margin:0;
    font-size:22px;
}

.header-text div{
    font-size:14px;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#0a3d62;
    margin-bottom:20px;
}

/* TABELA */
table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

th{
    background:#145a86;
    color:white;
}

tr:nth-child(even){
    background:#f8fbff;
}

/* LINKS */
a{
    text-decoration:none;
    font-weight:bold;
}

.editar{
    color:#1e88e5;
}

.excluir{
    color:#d32f2f;
}

/* VOLTAR */
.voltar{
    display:block;
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:#0a3d62;
}

.voltar:hover{
    text-decoration:underline;
}

/* RODAPÉ */
.rodape{
    text-align:center;
    margin-top:40px;
    color:#555;
    font-size:13px;
}

</style>
</head>

<body>

<div class="header">
    <img src="{{ url_for('static', filename='imagens/logo.png') }}">

    <div class="header-text">
        <h1>QUARTEL</h1>
        <div>Gerenciar Usuários</div>
    </div>
</div>

<div class="container">

<h2>Lista de Usuários</h2>

<table>

<tr>
<th>ID</th>
<th>Usuário</th>
<th>Perfil</th>
<th>Ações</th>
</tr>

{% for u in usuarios %}

<tr>

<td>{{u.id}}</td>
<td>{{u.username}}</td>
<td>{{u.perfil}}</td>

<td>

<a class="editar" href="/editar_usuario/{{u.id}}">Editar</a>

|

<a class="excluir"
href="/excluir_usuario/{{u.id}}"
onclick="return confirm('Deseja excluir este usuário?')">

Excluir

</a>

</td>

</tr>

{% endfor %}

</table>

<a class="voltar" href="/dashboard">← Voltar ao painel</a>

</div>

<div class="rodape">
    QUARTEL - Sistema FO Digital
</div>

</body>
</html>
