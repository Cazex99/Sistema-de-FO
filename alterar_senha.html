<!DOCTYPE html>
<html>
<head>
    <title>Alterar Senha - QUARTEL</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #eef3f8;
            margin: 0;
        }

        /* HEADER */
        .header {
            background: linear-gradient(90deg, #0a3d62, #1e6fa3);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header img {
            height: 70px;
        }

        .header-text h1 {
            margin: 0;
            font-size: 22px;
        }

        .header-text div {
            font-size: 14px;
        }

        /* CONTAINER */
        .container {
            padding: 40px;
            max-width: 500px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #0a3d62;
            text-align: center;
        }

        /* FORM */
        label {
            font-weight: 600;
            display: block;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #f8fbff;
        }

        input:focus {
            outline: none;
            border-color: #1e6fa3;
            box-shadow: 0 0 5px rgba(30,111,163,0.3);
        }

        /* BOTÃO */
        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #0a3d62;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #1e6fa3;
        }

        /* VOLTAR */
        .btn-voltar {
            width: 100%;
            margin-top: 10px;
            padding: 12px;
            background-color: #6c757d;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        .btn-voltar:hover {
            background-color: #5a6268;
        }

        /* MENSAGEM */
        .mensagem {
            color: red;
            margin-bottom: 10px;
            font-size: 14px;
            text-align: center;
        }

        /* RODAPÉ */
        .rodape {
            text-align: center;
            margin-top: 40px;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="header">
    <img src="{{ url_for('static', filename='imagens/logo.png') }}">

    <div class="header-text">
        <h1>QUARTEL</h1>
        <div>Alterar Senha</div>
    </div>
</div>

<div class="container">

    <h2>Alterar Senha</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="mensagem">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/alterar_senha" method="POST">

        <label>Senha Atual</label>
        <input type="password" name="senha_atual" required>

        <label>Nova Senha</label>
        <input type="password" name="nova_senha" required>

        <button type="submit">Confirmar Alteração</button>

    </form>

    <a class="btn-voltar" href="/dashboard">
        ← Voltar ao Painel
    </a>

</div>

<div class="rodape">
    QUARTEL - Sistema FO Digital
</div>

</body>
</html>
