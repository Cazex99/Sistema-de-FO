<!DOCTYPE html>
<html>
<head>
    <title>Editar Usuário - QUARTEL</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #eef3f8;
            margin: 0;
        }

        /* HEADER */
        .header {
            background: linear-gradient(90deg, #0a3d62, #1e6fa3);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header img {
            height: 70px;
        }

        .header-text h1 {
            margin: 0;
            font-size: 22px;
        }

        .header-text div {
            font-size: 14px;
        }

        /* CONTAINER */
        .container {
            width: 450px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #0a3d62;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-top: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background-color: #f8fbff;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1e6fa3;
            box-shadow: 0 0 5px rgba(30,111,163,0.3);
        }

        /* BOTÃO */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: #0a3d62;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background-color: #1e6fa3;
        }

        /* VOLTAR */
        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            font-weight: bold;
            color: #0a3d62;
        }

        .voltar:hover {
            text-decoration: underline;
        }

        /* RODAPÉ */
        .rodape {
            text-align: center;
            margin-top: 40px;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="header">
    <img src="{{ url_for('static', filename='imagens/logo.png') }}">

    <div class="header-text">
        <h1>QUARTEL</h1>
        <div>Editar Usuário</div>
    </div>
</div>

<div class="container">

    <h2>Editar Usuário</h2>

    <form method="POST">

        <label>Usuário</label>
        <input type="text" name="usuario" value="{{ usuario.username }}" required>

        <label>Nova Senha (opcional)</label>
        <input type="password" name="senha">

        <label>Perfil</label>
        <select name="perfil">

            <option value="avaliador" {% if usuario.perfil == "avaliador" %}selected{% endif %}>
                Avaliador
            </option>

            <option value="admin" {% if usuario.perfil == "admin" %}selected{% endif %}>
                Administrador
            </option>

        </select>

        <button type="submit">Salvar Alterações</button>

    </form>

    <a class="voltar" href="/gerenciar_usuarios">← Voltar</a>

</div>

<div class="rodape">
    QUARTEL - Sistema FO Digital
</div>

</body>
</html>
