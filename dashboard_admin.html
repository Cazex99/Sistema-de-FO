<!DOCTYPE html>
<html>
<head>
    <title>QUARTEL - Sistema FO</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #eef3f8;
            margin: 0;
        }

        /* HEADER */
        .header {
            background: linear-gradient(90deg, #0a3d62, #1e6fa3);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header img {
            height: 70px;
        }

        .header-text h1 {
            margin: 0;
            font-size: 22px;
        }

        .header-text div {
            font-size: 14px;
        }

        /* MENU */
        .menu {
            background-color: #145a86;
            padding: 12px;
            text-align: center;
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 600;
        }

        .menu a:hover {
            text-decoration: underline;
        }

        /* CONTAINER */
        .container {
            padding: 40px;
            max-width: 700px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #0a3d62;
        }

        /* SELECT */
        .select-militar {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #f8fbff;
        }

        .select-militar:focus {
            outline: none;
            border-color: #1e6fa3;
            box-shadow: 0 0 5px rgba(30,111,163,0.4);
        }

        /* BOTÕES */
        .botoes {
            margin-top: 25px;
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            background-color: #0a3d62;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #1e6fa3;
            transform: scale(1.03);
        }

        .btn-excluir {
            background-color: #8b0000;
        }

        .btn-excluir:hover {
            background-color: #a40000;
        }

        /* RODAPÉ */
        .rodape {
            text-align: center;
            margin-top: 40px;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="header">
    <img src="{{ url_for('static', filename='imagens/logo.png') }}" alt="Logo">

    <div class="header-text">
        <h1>QUARTEL</h1>
        <div>Sistema de Ficha de Observação</div>
    </div>
</div>

<div class="menu">
    <a href="/cadastrar_usuario">Cadastrar Usuário</a>
    <a href="/gerenciar_usuarios">Gerenciar Usuários</a>
    <a href="/cadastrar_militar">Cadastrar Militar</a>
    <a href="/relatorio">Relatório Geral</a>
    <a href="/logout">Sair</a>
</div>

<div class="container">

    <h2>Selecionar Militar</h2>

    <select class="select-militar" id="militarSelect">

        <option value="">-- Selecione o Militar --</option>

        {% for m in militares %}
        <option value="{{ m.id }}">
            {{ m.posto }} - {{ m.nome }} - {{ m.pelotao }}
        </option>
        {% endfor %}

    </select>

    <div class="botoes">
        <button onclick="avaliarMilitar()">Avaliar</button>
        <button onclick="editarMilitar()">Editar</button>
        <button class="btn-excluir" onclick="excluirMilitar()">Excluir</button>
    </div>

</div>

<div class="rodape">
    QUARTEL - Sistema FO Digital
</div>

<script>

function avaliarMilitar() {
    let id = document.getElementById("militarSelect").value;
    if (id) {
        window.location.href = "/avaliar/" + id;
    } else {
        alert("Selecione um militar.");
    }
}

function editarMilitar() {
    let id = document.getElementById("militarSelect").value;
    if (id) {
        window.location.href = "/editar_militar/" + id;
    } else {
        alert("Selecione um militar.");
    }
}

function excluirMilitar() {
    let id = document.getElementById("militarSelect").value;

    if (id) {
        if (confirm("Tem certeza que deseja excluir este militar?")) {
            window.location.href = "/excluir_militar/" + id;
        }
    } else {
        alert("Selecione um militar.");
    }
}

</script>

</body>
</html>
