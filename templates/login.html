<!DOCTYPE html>
<html>
<head>
    <title>Login - QUARTEL</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;

            /* IMAGEM DE FUNDO */
            background: url("{{ url_for('static', filename='imagens/fundo.jpg') }}") no-repeat center center;
            background-size: cover;
            position: relative;
        }

        /* OVERLAY  */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(10, 61, 98, 0.6);
            backdrop-filter: blur(4px);
            z-index: 0;
        }

        .login-box {
            background: white;
            padding: 35px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo {
            height: 80px;
            margin-bottom: 10px;
        }

        h2 {
            color: #0a3d62;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            display: block;
            text-align: left;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background-color: #f8fbff;
        }

        input:focus {
            outline: none;
            border-color: #1e6fa3;
            box-shadow: 0 0 5px rgba(30,111,163,0.3);
        }

        /* BOTÕES PADRONIZADOS */
        button, .btn-intranet {
            width: 100%;
            height: 44px;
            margin-top: 20px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        /* BOTÃO ENTRAR */
        button {
            background-color: #0a3d62;
            color: white;
        }

        button:hover {
            background-color: #1e6fa3;
        }

        /* BOTÃO INTRANET */
        .btn-intranet {
            background-color: #6c757d;
            color: white;
            text-decoration: none;
        }

        .btn-intranet:hover {
            background-color: #5a6268;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>

<body>

<!-- OVERLAY -->
<div class="overlay"></div>

<div class="login-box">

    <!-- LOGO -->
    <img src="{{ url_for('static', filename='imagens/logo.png') }}" class="logo">

    <h2>QUARTEL</h2>
    <div style="font-size: 13px; color: #555; margin-bottom: 10px;">
        Sistema de Fatos Observados
    </div>

    <form method="POST">

        <label>Usuário</label>
        <input type="text" name="username" required>

        <label>Senha</label>
        <input type="password" name="senha" required>

        <button type="submit">Entrar</button>

    </form>

    <!-- BOTÃO INTRANET -->
    <a class="btn-intranet" href="LINK DA INTRANET">
        ← Voltar para Intranet
    </a>

    <div class="footer">
        Sistema FO Digital
    </div>

</div>

</body>
</html>
