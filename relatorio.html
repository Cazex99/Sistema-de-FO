<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relatório Geral - QUARTEL</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #eef3f8;
            margin: 0;
        }

        /* HEADER */
        .header {
            background: linear-gradient(90deg, #0a3d62, #1e6fa3);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .header img {
            height: 70px;
        }

        .header-text h1 {
            margin: 0;
            font-size: 22px;
        }

        .header-text div {
            font-size: 14px;
        }

        /* CONTAINER */
        .container {
            padding: 40px;
            max-width: 1200px;
            margin: 40px auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #0a3d62;
        }

        /* TABELA */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #145a86;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }

        tbody tr:nth-child(even) {
            background-color: #f8fbff;
        }

        tbody tr:hover {
            background-color: #e3f2fd;
        }

        /* BOTÃO PDF */
        .btn-pdf {
            padding: 6px 12px;
            background-color: #0a3d62;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
        }

        .btn-pdf:hover {
            background-color: #1e6fa3;
        }

        /* VOLTAR */
        .btn-voltar {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background-color: #0a3d62;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .btn-voltar:hover {
            background-color: #1e6fa3;
        }

        /* RODAPÉ */
        .rodape {
            text-align: center;
            margin-top: 40px;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="header">
    <img src="{{ url_for('static', filename='imagens/logo.png') }}">

    <div class="header-text">
        <h1>QUARTEL</h1>
        <div>Relatório Geral</div>
    </div>
</div>

<div class="container">

    <h2>RELATÓRIO GERAL DE FO</h2>

    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Graduação</th>
                <th>Seção</th>
                <th>FO+</th>
                <th>FO-</th>
                <th>FO Neutro</th>
                <th>PDF</th>
            </tr>
        </thead>

        <tbody>
            {% for m in dados %}
            <tr>
                <td>{{ m.nome }}</td>
                <td>{{ m.posto }}</td>
                <td>{{ m.pelotao }}</td>
                <td>{{ m.fo_positivo }}</td>
                <td>{{ m.fo_negativo }}</td>
                <td>{{ m.neutro }}</td>
                <td>
                    <a class="btn-pdf" href="{{ url_for('relatorio_pdf', militar_id=m.id) }}">
                        Gerar PDF
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a class="btn-voltar" href="{{ url_for('dashboard') }}">
        ← Voltar ao Dashboard
    </a>

</div>

<div class="rodape">
    QUARTEL - Sistema FO Digital
</div>

</body>
</html>
